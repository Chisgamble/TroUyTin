<!DOCTYPE html>
<html class="light" lang="vi">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Đăng tin cho thuê - Bước 1</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed": "#d8e2ff",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#d3e4fe",
                        "background": "#f8f9ff",
                        "inverse-on-surface": "#eaf1ff",
                        "on-surface": "#0b1c30",
                        "tertiary-container": "#a36700",
                        "on-primary-container": "#fefcff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#005236",
                        "on-background": "#0b1c30",
                        "outline": "#727785",
                        "on-secondary-fixed": "#002113",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-tertiary-container": "#fffbff",
                        "on-tertiary": "#ffffff",
                        "primary": "#0058be",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#424754",
                        "tertiary-fixed-dim": "#ffb95f",
                        "tertiary-fixed": "#ffddb8",
                        "secondary-fixed-dim": "#4edea3",
                        "secondary": "#006c49",
                        "on-primary-fixed-variant": "#004395",
                        "surface": "#f8f9ff",
                        "on-primary-fixed": "#001a42",
                        "inverse-surface": "#213145",
                        "surface-container": "#e5eeff",
                        "on-tertiary-fixed": "#2a1700",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#dce9ff",
                        "tertiary": "#825100",
                        "surface-container-low": "#eff4ff",
                        "surface-variant": "#d3e4fe",
                        "on-secondary": "#ffffff",
                        "surface-bright": "#f8f9ff",
                        "primary-fixed-dim": "#adc6ff",
                        "on-secondary-container": "#00714d",
                        "secondary-fixed": "#6ffbbe",
                        "secondary-container": "#6cf8bb",
                        "surface-dim": "#cbdbf5",
                        "primary-container": "#2170e4",
                        "outline-variant": "#c2c6d6",
                        "inverse-primary": "#adc6ff",
                        "surface-tint": "#005ac2",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target": "48px",
                        "section-gap": "24px",
                        "stack-gap": "12px",
                        "container-margin": "16px"
                    },
                    "fontFamily": {
                        "label-bold": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-bold": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen flex flex-col pt-16 pb-24 md:pb-0">
    <!-- TopAppBar -->
    <header
        class="bg-surface border-b border-outline-variant flat no shadows fixed top-0 left-0 w-full z-50 flex items-center px-container-margin h-touch-target">
        <button
            class="mr-4 text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 p-2 rounded-full">
            <span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
        </button>
        <h1 class="font-headline-md font-bold text-primary flex-1 text-center pr-12 text-headline-lg-mobile"
            style="opacity: 0;">TroUyTin</h1>
    </header>
    <!-- Main Content -->
    <main class="flex-1 w-full max-w-2xl mx-auto px-container-margin pt-section-gap">
        <!-- Stepper -->
        <div class="mb-section-gap w-full">
            <div class="flex items-center justify-between mb-2">
                <div class="flex flex-col items-center flex-1">
                    <div
                        class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-bold text-label-bold mb-1">
                        1</div>
                    <span class="font-label-bold text-label-bold text-primary text-center hidden md:block">Thông tin cơ
                        bản</span>
                </div>
                <div class="h-[2px] bg-outline-variant flex-1 mx-2 mt-[-20px] md:mt-[-28px]"></div>
                <div class="flex flex-col items-center flex-1 opacity-50">
                    <div
                        class="w-8 h-8 rounded-full border-2 border-outline-variant text-on-surface-variant flex items-center justify-center font-label-bold text-label-bold mb-1">
                        2</div>
                    <span class="font-label-sm text-label-sm text-on-surface-variant text-center hidden md:block">Tiện
                        ích &amp; Vị trí</span>
                </div>
                <div class="h-[2px] bg-outline-variant flex-1 mx-2 mt-[-20px] md:mt-[-28px]"></div>
                <div class="flex flex-col items-center flex-1 opacity-50">
                    <div
                        class="w-8 h-8 rounded-full border-2 border-outline-variant text-on-surface-variant flex items-center justify-center font-label-bold text-label-bold mb-1">
                        3</div>
                    <span class="font-label-sm text-label-sm text-on-surface-variant text-center hidden md:block">Upload
                        Ảnh</span>
                </div>
                <div class="h-[2px] bg-outline-variant flex-1 mx-2 mt-[-20px] md:mt-[-28px]"></div>
                <div class="flex flex-col items-center flex-1 opacity-50">
                    <div
                        class="w-8 h-8 rounded-full border-2 border-outline-variant text-on-surface-variant flex items-center justify-center font-label-bold text-label-bold mb-1">
                        4</div>
                    <span
                        class="font-label-sm text-label-sm text-on-surface-variant text-center hidden md:block">Preview
                        &amp; Đăng</span>
                </div>
            </div>
            <!-- Mobile progress bar fallback -->
            <div class="md:hidden w-full h-1 bg-surface-container-highest rounded-full mt-2">
                <div class="h-1 bg-primary rounded-full w-1/4"></div>
            </div>
        </div>
        <!-- Form Card (Glassmorphism/Soft aesthetic) -->
        <div
            class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant/30 p-section-gap">
            <h2 class="font-headline-md text-headline-md text-on-surface mb-stack-gap">Thông tin cơ bản</h2>
            <form class="space-y-stack-gap">
                <!-- Tiêu đề -->
                <div>
                    <label class="block font-label-bold text-label-bold text-on-surface-variant mb-1" for="title">Tiêu
                        đề tin đăng *</label>
                    <input
                        class="w-full h-[48px] px-4 py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary font-body-lg text-body-lg text-on-surface transition-colors placeholder-outline"
                        id="title" name="title" placeholder="VD: Phòng trọ cao cấp, full nội thất..." type="text">
                </div>
                <!-- Loại phòng -->
                <div>
                    <label class="block font-label-bold text-label-bold text-on-surface-variant mb-1"
                        for="roomType">Loại phòng *</label>
                    <div class="relative">
                        <select
                            class="w-full h-[48px] px-4 py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary font-body-lg text-body-lg text-on-surface appearance-none cursor-pointer"
                            id="roomType" name="roomType">
                            <option disabled="" selected="" value="">Chọn loại phòng</option>
                            <option value="phong-tro">Phòng trọ</option>
                            <option value="can-ho-mini">Căn hộ mini (Chung cư mini)</option>
                            <option value="nha-nguyen-can">Nhà nguyên căn</option>
                            <option value="homestay">Homestay / Ký túc xá</option>
                        </select>
                        <span
                            class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none"
                            data-icon="expand_more">expand_more</span>
                    </div>
                </div>
                <!-- Lưới 2 cột cho Giá và Diện tích -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-stack-gap">
                    <!-- Giá phòng -->
                    <div>
                        <label class="block font-label-bold text-label-bold text-on-surface-variant mb-1"
                            for="price">Giá phòng / tháng *</label>
                        <div class="relative">
                            <input
                                class="w-full h-[48px] pl-4 pr-16 py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary font-body-lg text-body-lg text-on-surface"
                                id="price" name="price" placeholder="0" type="number">
                            <span
                                class="absolute right-4 top-1/2 -translate-y-1/2 font-body-md text-body-md text-outline-variant">VNĐ</span>
                        </div>
                    </div>
                    <!-- Diện tích -->
                    <div>
                        <label class="block font-label-bold text-label-bold text-on-surface-variant mb-1"
                            for="area">Diện tích *</label>
                        <div class="relative">
                            <input
                                class="w-full h-[48px] pl-4 pr-12 py-3 rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary font-body-lg text-body-lg text-on-surface"
                                id="area" name="area" placeholder="0" type="number">
                            <span
                                class="absolute right-4 top-1/2 -translate-y-1/2 font-body-md text-body-md text-outline-variant">m²</span>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </main>
    <!-- BottomNavBar (Mobile & Desktop Wizard Footer) -->
    <footer
        class="bg-surface dark:bg-surface-dim shadow-[0px_-4px_12px_rgba(0,0,0,0.05)] docked full-width bottom-0 rounded-t-xl fixed left-0 w-full z-50 flex justify-between items-center px-container-margin py-stack-gap">
        <button
            class="flex flex-row items-center justify-center text-primary dark:text-primary-fixed-dim border border-primary dark:border-primary-fixed-dim rounded-lg px-6 py-3 hover:opacity-90 active:scale-95 transition-transform font-label-bold text-label-bold h-touch-target">
            <span class="material-symbols-outlined mr-2" data-icon="chevron_left">chevron_left</span>
            Quay lại
        </button>
        <button
            class="flex flex-row items-center justify-center bg-primary dark:bg-primary-container text-on-primary dark:text-on-primary-container rounded-lg px-6 py-3 hover:opacity-90 active:scale-95 transition-transform font-label-bold text-label-bold h-touch-target shadow-[0px_8px_24px_rgba(59,130,246,0.15)]">
            Tiếp tục
            <span class="material-symbols-outlined ml-2" data-icon="chevron_right">chevron_right</span>
        </button>
    </footer>


</body>

</html>
