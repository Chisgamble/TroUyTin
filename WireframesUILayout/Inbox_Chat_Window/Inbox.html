        <h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary font-bold">TroUyTin</h1>

            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">search</span>
            <input

        </div>

                                class="material-symbols-outlined text-[14px] text-secondary-fixed-dim align-middle ml-1"
                                style="font-variation-settings: 'FILL' 1;">verified</span></span>
                        <span class="font-label-sm text-label-sm text-primary font-bold whitespace-nowrap">2 phút
                            trước</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-body-md text-body-md text-on-surface font-semibold truncate">Phòng vẫn còn bạn
                            nhé, bạn muốn qua xem lúc nào?</span>
                        <div class="w-2.5 h-2.5 bg-primary rounded-full shrink-0 ml-2"></div>
                    </div>
                </div>
            </button>
            <!-- Chat Item 2 (Read) -->
            <button
                class="w-full bg-surface rounded-xl p-3 flex items-center gap-4 shadow-[0px_4px_12px_rgba(0,0,0,0.05)] hover:bg-surface-container-low transition-colors active:scale-95 duration-200 text-left border border-transparent hover:border-outline-variant">

                    data-alt="A well-lit, professional headshot of a young Vietnamese man in his late 20s, wearing a clean white t-shirt. He has a friendly expression. The background is a clean, minimal white wall with subtle warm lighting casting soft shadows. The image feels approachable and modern, suitable for a trusted host profile."

                            trước</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-body-md text-body-md text-on-surface-variant truncate">Cảm ơn bạn, hợp đồng
                            mình đã gửi qua mail rồi nhé.</span>
                    </div>
                </div>
            </button>
            <!-- Chat Item 3 (Read) -->

                class="w-full bg-surface rounded-xl p-3 flex items-center gap-4 shadow-[0px_4px_12px_rgba(0,0,0,0.05)] hover:bg-surface-container-low transition-colors active:scale-95 duration-200 text-left border border-transparent hover:border-outline-variant">

                    data-alt="An avatar image showing a stylized, modern logo for an apartment complex. The logo features a minimalist geometric building icon in dark blue against a soft light blue background. It feels corporate yet modern and clean, fitting the app's minimal aesthetic."

                                style="font-variation-settings: 'FILL' 1;">verified</span></span>
                        <span class="font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">Hôm
                            qua</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-body-md text-body-md text-on-surface-variant truncate">Dạ chi phí điện nước sẽ

                    </div>
                </div>
            </button>

    <nav

        </a>
