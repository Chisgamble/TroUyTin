<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>RentVN - Onboarding</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#0058be",
                        "on-error": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "secondary": "#006c49",
                        "on-surface-variant": "#424754",
                        "error-container": "#ffdad6",
                        "tertiary": "#825100",
                        "secondary-fixed-dim": "#4edea3",
                        "on-surface": "#0b1c30",
                        "secondary-container": "#6cf8bb",
                        "on-secondary-fixed": "#002113",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#d3e4fe",
                        "surface-container-high": "#dce9ff",
                        "primary-container": "#2170e4",
                        "surface-bright": "#f8f9ff",
                        "on-primary-fixed-variant": "#004395",
                        "background": "#f8f9ff",
                        "surface-dim": "#cbdbf5",
                        "on-background": "#0b1c30",
                        "outline-variant": "#c2c6d6",
                        "surface-container": "#e5eeff",
                        "tertiary-fixed": "#ffddb8",
                        "primary-fixed": "#d8e2ff",
                        "on-tertiary-fixed-variant": "#653e00",
                        "tertiary-container": "#a36700",
                        "inverse-primary": "#adc6ff",
                        "primary-fixed-dim": "#adc6ff",
                        "inverse-surface": "#213145",
                        "surface-container-low": "#eff4ff",
                        "on-tertiary-fixed": "#2a1700",
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-secondary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "inverse-on-surface": "#eaf1ff",
                        "error": "#ba1a1a",
                        "on-secondary-container": "#00714d",
                        "surface-tint": "#005ac2",
                        "on-secondary-fixed-variant": "#005236",
                        "on-primary-fixed": "#001a42",
                        "on-tertiary-container": "#fffbff",
                        "outline": "#727785",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f8f9ff",
                        "secondary-fixed": "#6ffbbe"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target": "48px",
                        "section-gap": "24px",
                        "stack-gap": "12px",
                        "container-margin": "16px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "label-bold": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "label-bold": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Custom Checkbox styles for the cards */
        .card-checkbox:checked+div {
            border-color: #0058be;
            /* primary */
            background-color: #e5eeff;
            /* surface-container */
        }

        .card-checkbox:checked+div .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        .check-icon {
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .habit-card {
            transition: all 0.2s ease-in-out;
        }

        .habit-card:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body
    class="bg-background text-on-background font-body-md antialiased min-h-screen flex flex-col items-center justify-center">
    <!-- Mobile Container (Max Width for Web) -->
    <main class="w-full max-w-[480px] h-[100dvh] flex flex-col relative bg-surface shadow-2xl overflow-hidden mx-auto">
        <!-- TopAppBar (Transactional - Hidden Navigation Shell, keeping back button) -->
        <header
            class="flex items-center justify-between px-container-margin w-full h-touch-target bg-surface border-b border-outline-variant z-10 shrink-0">
            <button aria-label="Go back"
                class="w-touch-target h-touch-target flex items-center justify-center text-primary hover:bg-surface-variant/50 transition-colors duration-200 rounded-full">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div class="text-[24px] font-bold text-primary">TroUyTin</div>
            <div class="w-touch-target"></div> <!-- Spacer for center alignment -->
        </header>
        <!-- Progress Bar -->
        <div class="w-full bg-surface-variant h-1 shrink-0">
            <div class="bg-primary h-1 w-2/3 transition-all duration-500 ease-out"></div>
        </div>
        <!-- Scrollable Content -->
        <div class="flex-1 overflow-y-auto px-container-margin pt-section-gap pb-[100px] flex flex-col gap-section-gap">
            <!-- Header Text -->
            <div class="text-center animate-fade-in-up">
                <h1 class="font-headline-md text-headline-md text-on-surface mb-2">Thói quen sinh hoạt của bạn là gì?
                </h1>
                <p class="font-body-md text-body-md text-on-surface-variant">Chọn các thói quen để chúng tôi gợi ý bạn
                    cùng phòng phù hợp nhất. (Chọn nhiều)</p>
            </div>
            <!-- Grid of Cards -->
            <div class="grid grid-cols-2 gap-stack-gap">
                <!-- Card 1: Ngủ sớm -->
                <label class="cursor-pointer relative habit-card block w-full h-full">
                    <input class="card-checkbox sr-only" name="habit" type="checkbox" value="ngu-som">
                    <div
                        class="border-2 border-outline-variant bg-surface-container-low rounded-xl p-4 flex flex-col items-center justify-center gap-3 text-center min-h-[120px] transition-all hover:shadow-md hover:border-primary/50 relative overflow-hidden group">
                        <span
                            class="material-symbols-outlined check-icon absolute top-2 right-2 text-primary bg-white rounded-full p-0.5 shadow-sm text-[20px] filled">check_circle</span>
                        <div
                            class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined filled text-[28px]">bedtime</span>
                        </div>
                        <span class="font-label-bold text-label-bold text-on-surface">Ngủ sớm</span>
                    </div>
                </label>
                <!-- Card 2: Cú đêm -->
                <label class="cursor-pointer relative habit-card block w-full h-full">
                    <input class="card-checkbox sr-only" name="habit" type="checkbox" value="cu-dem">
                    <div
                        class="border-2 border-outline-variant bg-surface-container-low rounded-xl p-4 flex flex-col items-center justify-center gap-3 text-center min-h-[120px] transition-all hover:shadow-md hover:border-primary/50 relative overflow-hidden group">
                        <span
                            class="material-symbols-outlined check-icon absolute top-2 right-2 text-primary bg-white rounded-full p-0.5 shadow-sm text-[20px] filled">check_circle</span>
                        <div
                            class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-[28px]">dark_mode</span>
                        </div>
                        <span class="font-label-bold text-label-bold text-on-surface">Cú đêm</span>
                    </div>
                </label>
                <!-- Card 3: Hút thuốc -->
                <label class="cursor-pointer relative habit-card block w-full h-full">
                    <input class="card-checkbox sr-only" name="habit" type="checkbox" value="hut-thuoc">
                    <div
                        class="border-2 border-outline-variant bg-surface-container-low rounded-xl p-4 flex flex-col items-center justify-center gap-3 text-center min-h-[120px] transition-all hover:shadow-md hover:border-primary/50 relative overflow-hidden group">
                        <span
                            class="material-symbols-outlined check-icon absolute top-2 right-2 text-primary bg-white rounded-full p-0.5 shadow-sm text-[20px] filled">check_circle</span>
                        <div
                            class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-[28px]">smoking_rooms</span>
                        </div>
                        <span class="font-label-bold text-label-bold text-on-surface">Hút thuốc</span>
                    </div>
                </label>
                <!-- Card 4: Thích nấu ăn -->
                <label class="cursor-pointer relative habit-card block w-full h-full">
                    <input class="card-checkbox sr-only" name="habit" type="checkbox" value="nau-an">
                    <div
                        class="border-2 border-outline-variant bg-surface-container-low rounded-xl p-4 flex flex-col items-center justify-center gap-3 text-center min-h-[120px] transition-all hover:shadow-md hover:border-primary/50 relative overflow-hidden group">
                        <span
                            class="material-symbols-outlined check-icon absolute top-2 right-2 text-primary bg-white rounded-full p-0.5 shadow-sm text-[20px] filled">check_circle</span>
                        <div
                            class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-[28px]">restaurant</span>
                        </div>
                        <span class="font-label-bold text-label-bold text-on-surface">Thích nấu ăn</span>
                    </div>
                </label>
                <!-- Card 5: Nuôi thú cưng -->
                <label class="cursor-pointer relative habit-card block w-full h-full">
                    <input class="card-checkbox sr-only" name="habit" type="checkbox" value="thu-cung">
                    <div
                        class="border-2 border-outline-variant bg-surface-container-low rounded-xl p-4 flex flex-col items-center justify-center gap-3 text-center min-h-[120px] transition-all hover:shadow-md hover:border-primary/50 relative overflow-hidden group">
                        <span
                            class="material-symbols-outlined check-icon absolute top-2 right-2 text-primary bg-white rounded-full p-0.5 shadow-sm text-[20px] filled">check_circle</span>
                        <div
                            class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-[28px]">pets</span>
                        </div>
                        <span class="font-label-bold text-label-bold text-on-surface">Nuôi thú cưng</span>
                    </div>
                </label>
                <!-- Card 6: Hay dọn dẹp -->
                <label class="cursor-pointer relative habit-card block w-full h-full">
                    <input class="card-checkbox sr-only" name="habit" type="checkbox" value="don-dep">
                    <div
                        class="border-2 border-outline-variant bg-surface-container-low rounded-xl p-4 flex flex-col items-center justify-center gap-3 text-center min-h-[120px] transition-all hover:shadow-md hover:border-primary/50 relative overflow-hidden group">
                        <span
                            class="material-symbols-outlined check-icon absolute top-2 right-2 text-primary bg-white rounded-full p-0.5 shadow-sm text-[20px] filled">check_circle</span>
                        <div
                            class="w-12 h-12 rounded-full bg-surface-variant flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                            <span class="material-symbols-outlined text-[28px]">cleaning_services</span>
                        </div>
                        <span class="font-label-bold text-label-bold text-on-surface">Hay dọn dẹp</span>
                    </div>
                </label>
            </div>
            <!-- Optional spacing element if list grows -->
            <div class="h-4 w-full shrink-0"></div>
        </div>
        <!-- Fixed Bottom CTA -->
        <div
            class="absolute bottom-0 left-0 w-full bg-surface border-t border-outline-variant px-container-margin py-4 pb-[max(16px,env(safe-area-inset-bottom))] shadow-[0_-4px_12px_rgba(0,0,0,0.05)] z-20">
            <button
                class="w-full h-touch-target bg-primary text-on-primary font-headline-md text-headline-md rounded-xl flex items-center justify-center gap-2 hover:bg-primary/90 active:scale-[0.98] transition-all shadow-md">
                <span class="">Tiếp tục</span>
                <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
            </button>
        </div>
    </main>
    <script>
        // Simple script to handle visual feedback on initial load
        document.addEventListener('DOMContentLoaded', () => {
            const checkboxes = document.querySelectorAll('.card-checkbox');
            // Just for demonstration, pre-select one to show the state
            if (checkboxes.length > 0) {
                // checkboxes[0].checked = true;
            }
        });
    </script>


</body>

</html>
