<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TroUyTin - Thiết lập hồ sơ</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#d3e4fe",
                        "primary-fixed": "#d8e2ff",
                        "on-primary-container": "#fefcff",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#002113",
                        "primary-fixed-dim": "#adc6ff",
                        "on-background": "#0b1c30",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-container": "#e5eeff",
                        "tertiary": "#825100",
                        "outline": "#727785",
                        "on-error-container": "#93000a",
                        "outline-variant": "#c2c6d6",
                        "on-surface-variant": "#424754",
                        "surface-tint": "#005ac2",
                        "surface-bright": "#f8f9ff",
                        "background": "#f8f9ff",
                        "on-tertiary-fixed": "#2a1700",
                        "surface": "#f8f9ff",
                        "inverse-surface": "#213145",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-primary": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "inverse-primary": "#adc6ff",
                        "on-secondary-container": "#00714d",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-fixed-variant": "#004395",
                        "primary": "#0058be",
                        "secondary-fixed-dim": "#4edea3",
                        "secondary-container": "#6cf8bb",
                        "surface-variant": "#d3e4fe",
                        "on-primary-fixed": "#001a42",
                        "surface-dim": "#cbdbf5",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed": "#ffddb8",
                        "tertiary-fixed-dim": "#ffb95f",
                        "primary-container": "#2170e4",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary": "#ffffff",
                        "on-surface": "#0b1c30",
                        "on-tertiary-container": "#fffbff",
                        "tertiary-container": "#a36700",
                        "secondary-fixed": "#6ffbbe",
                        "surface-container-low": "#eff4ff",
                        "secondary": "#006c49",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "12px",
                        "section-gap": "24px",
                        "container-margin": "16px",
                        "touch-target": "48px"
                    },
                    "fontFamily": {
                        "label-bold": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "label-bold": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col">
<!-- TopNavBar (Linear intent: suppressed per instructions, but requested in prompt layout. Resolving: using nav as header for branding, no links) -->
<header class="w-full top-0 border-b border-outline-variant bg-surface">
<div class="flex justify-between items-center px-container-margin md:px-section-gap py-4 max-w-7xl mx-auto">
<div class="font-headline-md text-headline-md font-bold text-primary">TroUyTin</div>
<div class="flex gap-4 items-center">
<span class="material-symbols-outlined text-primary cursor-pointer" data-icon="help_outline" data-weight="outline">help_outline</span>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin py-section-gap">
<div class="max-w-4xl w-full mx-auto flex flex-col items-center">
<!-- Onboarding Headers -->
<div class="text-center mb-10 w-full">
<h1 class="font-headline-md text-headline-md md:text-3xl font-bold text-on-background mb-4">Chào mừng bạn đến với TroUyTin!</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto">Thói quen sinh hoạt của bạn là gì? (Chọn nhiều)</p>
</div>
<!-- Habit Grid -->
<div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-4 gap-4 w-full mb-12">
<!-- Card: Ngủ sớm (Selected) -->
<button class="relative flex flex-col items-center justify-center p-6 rounded-xl border-2 border-primary bg-primary-fixed-dim/20 transition-all duration-200 hover:shadow-md h-32 touch-target">
<span class="absolute top-2 right-2 material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="material-symbols-outlined text-primary text-4xl mb-2" data-icon="bedtime">bedtime</span>
<span class="font-label-bold text-label-bold text-on-background">Ngủ sớm</span>
</button>
<!-- Card: Cú đêm (Unselected) -->
<button class="relative flex flex-col items-center justify-center p-6 rounded-xl border border-outline-variant bg-surface transition-all duration-200 hover:border-primary hover:bg-surface-container h-32 touch-target">
<span class="material-symbols-outlined text-on-surface-variant text-4xl mb-2" data-icon="nights_stay">nights_stay</span>
<span class="font-body-md text-body-md text-on-background">Cú đêm</span>
</button>
<!-- Card: Hút thuốc (Unselected) -->
<button class="relative flex flex-col items-center justify-center p-6 rounded-xl border border-outline-variant bg-surface transition-all duration-200 hover:border-primary hover:bg-surface-container h-32 touch-target">
<span class="material-symbols-outlined text-on-surface-variant text-4xl mb-2" data-icon="smoking_rooms">smoking_rooms</span>
<span class="font-body-md text-body-md text-on-background">Hút thuốc</span>
</button>
<!-- Card: Thích nấu ăn (Selected) -->
<button class="relative flex flex-col items-center justify-center p-6 rounded-xl border-2 border-primary bg-primary-fixed-dim/20 transition-all duration-200 hover:shadow-md h-32 touch-target">
<span class="absolute top-2 right-2 material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="material-symbols-outlined text-primary text-4xl mb-2" data-icon="restaurant">restaurant</span>
<span class="font-label-bold text-label-bold text-on-background">Thích nấu ăn</span>
</button>
<!-- Card: Nuôi thú cưng (Unselected) -->
<button class="relative flex flex-col items-center justify-center p-6 rounded-xl border border-outline-variant bg-surface transition-all duration-200 hover:border-primary hover:bg-surface-container h-32 touch-target">
<span class="material-symbols-outlined text-on-surface-variant text-4xl mb-2" data-icon="pets">pets</span>
<span class="font-body-md text-body-md text-on-background">Nuôi thú cưng</span>
</button>
<!-- Card: Hay dọn dẹp (Selected) -->
<button class="relative flex flex-col items-center justify-center p-6 rounded-xl border-2 border-primary bg-primary-fixed-dim/20 transition-all duration-200 hover:shadow-md h-32 touch-target">
<span class="absolute top-2 right-2 material-symbols-outlined text-primary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="material-symbols-outlined text-primary text-4xl mb-2" data-icon="cleaning_services">cleaning_services</span>
<span class="font-label-bold text-label-bold text-on-background">Hay dọn dẹp</span>
</button>
<!-- Card: Thích yên tĩnh (Unselected) -->
<button class="relative flex flex-col items-center justify-center p-6 rounded-xl border border-outline-variant bg-surface transition-all duration-200 hover:border-primary hover:bg-surface-container h-32 touch-target">
<span class="material-symbols-outlined text-on-surface-variant text-4xl mb-2" data-icon="volume_off">volume_off</span>
<span class="font-body-md text-body-md text-on-background">Thích yên tĩnh</span>
</button>
<!-- Card: Hay tụ tập (Unselected) -->
<button class="relative flex flex-col items-center justify-center p-6 rounded-xl border border-outline-variant bg-surface transition-all duration-200 hover:border-primary hover:bg-surface-container h-32 touch-target">
<span class="material-symbols-outlined text-on-surface-variant text-4xl mb-2" data-icon="celebration">celebration</span>
<span class="font-body-md text-body-md text-on-background">Hay tụ tập</span>
</button>
</div>
<!-- Action Area -->
<div class="flex flex-col items-center w-full max-w-sm gap-4">
<button class="w-full bg-primary text-on-primary font-body-lg text-body-lg rounded-full h-[48px] flex items-center justify-center hover:bg-primary/90 transition-colors shadow-sm">
                    Tiếp tục
                </button>
<a class="font-body-md text-body-md text-outline hover:text-primary transition-colors py-2" href="#">
                    Bỏ qua bước này
                </a>
</div>
</div>
</main>
<!-- Footer intentionally suppressed per transactional intent rule -->
</body></html>
