<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Đánh giá trải nghiệm</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed-dim": "#ffb95f",
                        "on-secondary-fixed": "#002113",
                        "tertiary-fixed": "#ffddb8",
                        "surface-container-high": "#dce9ff",
                        "surface-container-lowest": "#ffffff",
                        "surface": "#f8f9ff",
                        "outline": "#727785",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-background": "#0b1c30",
                        "on-primary": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "on-surface-variant": "#424754",
                        "surface-container-low": "#eff4ff",
                        "surface-bright": "#f8f9ff",
                        "on-secondary-fixed-variant": "#005236",
                        "on-tertiary": "#ffffff",
                        "on-primary-fixed-variant": "#004395",
                        "inverse-surface": "#213145",
                        "on-surface": "#0b1c30",
                        "primary-fixed": "#d8e2ff",
                        "background": "#f8f9ff",
                        "on-error": "#ffffff",
                        "secondary": "#006c49",
                        "primary-fixed-dim": "#adc6ff",
                        "on-tertiary-container": "#fffbff",
                        "surface-tint": "#005ac2",
                        "secondary-fixed": "#6ffbbe",
                        "on-primary-fixed": "#001a42",
                        "surface-container-highest": "#d3e4fe",
                        "inverse-primary": "#adc6ff",
                        "inverse-on-surface": "#eaf1ff",
                        "primary": "#0058be",
                        "on-secondary-container": "#00714d",
                        "surface-variant": "#d3e4fe",
                        "on-tertiary-fixed-variant": "#653e00",
                        "tertiary-container": "#a36700",
                        "surface-container": "#e5eeff",
                        "primary-container": "#2170e4",
                        "secondary-fixed-dim": "#4edea3",
                        "tertiary": "#825100",
                        "on-tertiary-fixed": "#2a1700",
                        "error-container": "#ffdad6",
                        "secondary-container": "#6cf8bb",
                        "error": "#ba1a1a",
                        "outline-variant": "#c2c6d6",
                        "on-primary-container": "#fefcff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target": "48px",
                        "section-gap": "24px",
                        "container-margin": "16px",
                        "stack-gap": "12px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-bold": ["Inter"],
                        "headline-lg-mobile": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["12px", { "lineHeight": "16px", "fontWeight": "400" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-bold": ["12px", { "lineHeight": "16px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
    <style>
        .star-rating .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
        }

        .star-rating .material-symbols-outlined.active {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            color: #ffb95f;
            /* tertiary-fixed-dim mapped to warning/star color for emphasis */
        }
    </style>
</head>

<body
    class="bg-background antialiased font-body-md text-on-background h-screen flex items-center justify-center relative">
    <!-- Faux Background Content to provide context for the modal -->
    <div class="absolute inset-0 p-container-margin grid gap-stack-gap opacity-50 blur-sm pointer-events-none">
        <div class="bg-surface rounded-xl p-4 shadow-sm">
            <div class="h-48 bg-surface-variant rounded-lg mb-4 flex items-center justify-center">
                <span class="material-symbols-outlined text-outline-variant text-4xl">image</span>
            </div>
            <div class="h-6 w-3/4 bg-surface-variant rounded mb-2"></div>
            <div class="h-4 w-1/2 bg-surface-variant rounded"></div>
        </div>
        <div class="bg-surface rounded-xl p-4 shadow-sm">
            <div class="h-10 bg-surface-variant rounded mb-2"></div>
            <div class="h-10 bg-surface-variant rounded"></div>
        </div>
    </div>
    <!-- Modal Backdrop -->
    <div
        class="fixed inset-0 bg-on-background/40 backdrop-blur-sm z-40 flex items-center justify-center p-container-margin transition-opacity duration-300">
        <!-- Modal Container -->
        <div
            class="bg-surface w-full max-w-sm rounded-[24px] shadow-lg overflow-hidden transform scale-100 transition-transform duration-300">
            <!-- Modal Header -->
            <div class="pt-section-gap px-section-gap pb-stack-gap text-center">
                <div
                    class="w-12 h-12 bg-primary-container rounded-full mx-auto mb-4 flex items-center justify-center text-on-primary-container">
                    <span class="material-symbols-outlined text-[28px]"
                        style="font-variation-settings: 'FILL' 1;">rate_review</span>
                </div>
                <h2 class="font-headline-md text-headline-md text-on-surface mb-2">Đánh giá trải nghiệm của bạn</h2>
                <p class="font-body-md text-body-md text-on-surface-variant">Ý kiến của bạn giúp cộng đồng TroUyTin ngày
                    càng hoàn thiện hơn.</p>
            </div>
            <!-- Modal Body -->
            <div class="px-section-gap pb-section-gap">
                <!-- Star Rating -->
                <div class="flex justify-center items-center gap-2 mb-6 star-rating" id="starContainer">
                    <span
                        class="material-symbols-outlined text-[40px] text-outline-variant hover:text-tertiary-fixed-dim"
                        data-rating="1">star</span>
                    <span
                        class="material-symbols-outlined text-[40px] text-outline-variant hover:text-tertiary-fixed-dim"
                        data-rating="2">star</span>
                    <span
                        class="material-symbols-outlined text-[40px] text-outline-variant hover:text-tertiary-fixed-dim"
                        data-rating="3">star</span>
                    <span
                        class="material-symbols-outlined text-[40px] text-outline-variant hover:text-tertiary-fixed-dim"
                        data-rating="4">star</span>
                    <span
                        class="material-symbols-outlined text-[40px] text-outline-variant hover:text-tertiary-fixed-dim"
                        data-rating="5">star</span>
                </div>
                <!-- Textarea -->
                <div class="relative">
                    <textarea
                        class="w-full bg-surface-bright border border-outline-variant rounded-xl p-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary transition-shadow resize-none h-32"
                        placeholder="Chia sẻ thêm về phòng trọ và chủ nhà nhé..."></textarea>
                </div>
            </div>
            <!-- Modal Actions -->
            <div
                class="px-section-gap pb-section-gap pt-stack-gap flex gap-stack-gap border-t border-surface-variant bg-surface-container-lowest">
                <button
                    class="flex-1 h-touch-target rounded-full border border-outline text-on-surface font-label-bold text-label-bold flex items-center justify-center hover:bg-surface-variant transition-colors active:scale-95">
                    Hủy
                </button>
                <button
                    class="flex-1 h-touch-target rounded-full bg-primary text-on-primary font-label-bold text-label-bold flex items-center justify-center hover:bg-surface-tint shadow-[0px_4px_12px_rgba(0,88,190,0.2)] transition-colors active:scale-95">
                    Gửi đánh giá
                </button>
            </div>
        </div>
    </div>
    <script>
        // Simple star rating interaction
        const stars = document.querySelectorAll('#starContainer .material-symbols-outlined');
        let currentRating = 0;

        stars.forEach(star => {
            star.addEventListener('click', (e) => {
                const rating = parseInt(e.target.getAttribute('data-rating'));
                currentRating = rating;
                updateStars(rating);
            });

            star.addEventListener('mouseenter', (e) => {
                const rating = parseInt(e.target.getAttribute('data-rating'));
                updateStars(rating, true);
            });

            star.addEventListener('mouseleave', () => {
                updateStars(currentRating);
            });
        });

        function updateStars(rating, isHover = false) {
            stars.forEach((star, index) => {
                if (index < rating) {
                    star.classList.add('active');
                    star.classList.remove('text-outline-variant');
                } else {
                    star.classList.remove('active');
                    if (!isHover && index >= currentRating) {
                        star.classList.add('text-outline-variant');
                    }
                }
            });
        }
    </script>


</body>

</html>
