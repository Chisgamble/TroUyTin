<!DOCTYPE html>
<html class="light" lang="vi">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>Tìm bạn ở ghép - TroUyTin</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#2a1700",
                        "tertiary-fixed-dim": "#ffb95f",
                        "outline-variant": "#c2c6d6",
                        "on-primary-fixed-variant": "#004395",
                        "inverse-surface": "#213145",
                        "on-secondary-container": "#00714d",
                        "secondary": "#006c49",
                        "on-secondary-fixed-variant": "#005236",
                        "on-tertiary-fixed-variant": "#653e00",
                        "error": "#ba1a1a",
                        "surface-dim": "#cbdbf5",
                        "primary": "#0058be",
                        "on-error-container": "#93000a",
                        "surface-bright": "#f8f9ff",
                        "secondary-fixed-dim": "#4edea3",
                        "tertiary-fixed": "#ffddb8",
                        "on-surface-variant": "#424754",
                        "surface-container-high": "#dce9ff",
                        "surface-tint": "#005ac2",
                        "surface-container-highest": "#d3e4fe",
                        "on-surface": "#0b1c30",
                        "on-primary-container": "#fefcff",
                        "primary-fixed": "#d8e2ff",
                        "outline": "#727785",
                        "on-tertiary-container": "#fffbff",
                        "on-secondary-fixed": "#002113",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#e5eeff",
                        "primary-container": "#2170e4",
                        "inverse-primary": "#adc6ff",
                        "on-secondary": "#ffffff",
                        "on-error": "#ffffff",
                        "tertiary-container": "#a36700",
                        "on-background": "#0b1c30",
                        "surface-container-low": "#eff4ff",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#825100",
                        "secondary-fixed": "#6ffbbe",
                        "inverse-on-surface": "#eaf1ff",
                        "surface": "#f8f9ff",
                        "error-container": "#ffdad6",
                        "secondary-container": "#6cf8bb",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#001a42",
                        "background": "#f8f9ff",
                        "surface-variant": "#d3e4fe",
                        "primary-fixed-dim": "#adc6ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "12px",
                        "touch-target": "48px",
                        "section-gap": "24px",
                        "container-margin": "16px"
                    },
                    "fontFamily": {
                        "body-md": [
                            "Inter"
                        ],
                        "headline-md": [
                            "Inter"
                        ],
                        "label-sm": [
                            "Inter"
                        ],
                        "label-bold": [
                            "Inter"
                        ],
                        "body-lg": [
                            "Inter"
                        ],
                        "headline-lg-mobile": [
                            "Inter"
                        ]
                    },
                    "fontSize": {
                        "body-md": [
                            "14px",
                            {
                                "lineHeight": "20px",
                                "fontWeight": "400"
                            }
                        ],
                        "headline-md": [
                            "20px",
                            {
                                "lineHeight": "28px",
                                "letterSpacing": "-0.01em",
                                "fontWeight": "600"
                            }
                        ],
                        "label-sm": [
                            "12px",
                            {
                                "lineHeight": "16px",
                                "fontWeight": "400"
                            }
                        ],
                        "label-bold": [
                            "12px",
                            {
                                "lineHeight": "16px",
                                "fontWeight": "600"
                            }
                        ],
                        "body-lg": [
                            "16px",
                            {
                                "lineHeight": "24px",
                                "fontWeight": "400"
                            }
                        ],
                        "headline-lg-mobile": [
                            "24px",
                            {
                                "lineHeight": "32px",
                                "letterSpacing": "-0.02em",
                                "fontWeight": "700"
                            }
                        ]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }

        /* Prevent bounce scroll on mobile for Tinder-like feel */
        body {
            overscroll-behavior-y: none;
        }
    </style>
</head>

<body class="bg-background text-on-background h-screen flex flex-col font-body-md text-body-md overflow-hidden">
    <!-- Top App Bar -->
    <header
        class="flex justify-between items-center px-container-margin h-touch-target w-full bg-surface shrink-0 z-50 shadow-[0px_4px_12px_rgba(0,0,0,0.02)]">
        <button aria-label="Go back"
            class="w-touch-target h-touch-target flex items-center justify-start text-on-surface hover:bg-surface-container transition-colors rounded-full active:opacity-70">
            <span class="material-symbols-outlined text-[24px]">chevron_left</span>
        </button>
        <h1 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-on-surface">TroUyTin</h1>
        <div class="w-touch-target h-touch-target"></div> <!-- Spacer for centering -->
    </header>
    <!-- Main Content Canvas (Tinder-like Card Area) -->
    <main class="flex-1 relative flex flex-col items-center pt-4 px-container-margin pb-[100px] overflow-hidden">
        <!-- The Card -->
        <div class="w-full max-w-[400px] flex-1 relative rounded-xl shadow-lg overflow-hidden bg-surface-container-highest transition-transform duration-300 ease-out"
            id="swipeCard">
            <!-- Background Image -->
            <div class="absolute inset-0 bg-cover bg-center w-full h-full"
                data-alt="A bright, clean modern bedroom lit by soft morning sunlight. A friendly young Vietnamese adult sits comfortably on the edge of a neatly made bed, looking approachable and tidy. The room features minimal decor, light wood furniture, and a small indoor plant, creating a welcoming, safe, and trustworthy atmosphere typical of a modern urban apartment in Vietnam. Shot from a slightly low angle to give a sense of presence."
                style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuC-gPSvtGk5CpUN5EemaEVQmq6Gn9GZVndB_UcaaeDGO71N__it8r5ELlyoPiVa0iNWOl2A7_oyVSlst_cRSjjEjslcT4Waxob4S6imQPQYfCs1FAdfC-8BtNBYTR97xafPESc0vm-7TFTWv8F3ytPRM5_eLzRYbTaeRSdHrsoZMk82e1MW9XM5C-dsDUhQmF4ev3SKQBXxDCSTuqQ7GrxScv30Oa-f45-SOXynuVYqfyipeZrWdU7dXUvY0yLF7WnoWjUTUftgG2YT')">
            </div>
            <!-- Gradient Overlay for text readability -->
            <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-black/80 via-black/40 to-transparent">
            </div>
            <!-- Top Right Overlay: Match Percentage -->
            <div
                class="absolute top-4 right-4 bg-surface/90 backdrop-blur-sm px-3 py-1.5 rounded-full flex items-center gap-1 shadow-md">
                <span class="material-symbols-outlined text-[16px] text-secondary icon-fill">stars</span>
                <span class="font-label-bold text-label-bold text-secondary">85% Hợp</span>
            </div>
            <!-- Bottom Overlay: User Info -->
            <div class="absolute bottom-0 left-0 right-0 p-section-gap">
                <div class="flex items-end gap-2 mb-1">
                    <h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-primary">Lê Minh Anh</h2>
                    <span class="font-headline-md text-headline-md text-on-primary/90 font-normal">21</span>
                    <!-- Verified Badge -->
                    <div class="flex items-center justify-center w-5 h-5 rounded-full bg-secondary ml-1 mb-1 shadow-sm">
                        <span class="material-symbols-outlined text-[12px] text-on-secondary icon-fill">check</span>
                    </div>
                </div>
                <div class="flex items-center gap-1.5 mb-4 text-on-primary/90">
                    <span class="material-symbols-outlined text-[16px]">school</span>
                    <p class="font-body-md text-body-md">Sinh viên ĐH Ngoại Thương</p>
                </div>
                <!-- Tag System -->
                <div class="flex flex-wrap gap-2">
                    <span
                        class="px-3 py-1 rounded-full bg-secondary text-on-secondary font-label-sm text-label-sm shadow-sm flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">bedtime</span> Ngủ sớm
                    </span>
                    <span
                        class="px-3 py-1 rounded-full bg-error text-on-error font-label-sm text-label-sm shadow-sm flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">pets</span> Có nuôi mèo
                    </span>
                    <span
                        class="px-3 py-1 rounded-full bg-primary text-on-primary font-label-sm text-label-sm shadow-sm flex items-center gap-1">
                        <span class="material-symbols-outlined text-[14px]">cleaning_services</span> Gọn gàng
                    </span>
                </div>
            </div>
        </div>
        <!-- Action Bar (Floating Buttons) -->
        <div class="flex justify-center items-center gap-8 mt-6 shrink-0 h-[80px]">
            <!-- Pass Button -->
            <button aria-label="Bỏ qua"
                class="w-[64px] h-[64px] rounded-full bg-surface shadow-[0px_4px_12px_rgba(0,0,0,0.1)] flex items-center justify-center text-outline hover:bg-surface-container hover:scale-105 active:scale-95 transition-all duration-200">
                <span class="material-symbols-outlined text-[32px]">close</span>
            </button>
            <!-- Connect Button -->
            <button aria-label="Kết nối"
                class="w-[72px] h-[72px] rounded-full bg-primary shadow-[0px_8px_24px_rgba(0,88,190,0.25)] flex items-center justify-center text-on-primary hover:bg-primary-container hover:scale-105 active:scale-95 transition-all duration-200">
                <span class="material-symbols-outlined text-[36px] icon-fill">favorite</span>
            </button>
        </div>
    </main>
    <!-- Bottom Navigation Bar (from JSON) -->
    <nav
        class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface dark:bg-on-background shadow-[0px_-4px_12px_rgba(0,0,0,0.05)] flex justify-around items-center h-[64px] px-container-margin pb-safe">
        <!-- Trang chủ -->
        <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-variant transition-all active:scale-95 duration-200 w-16 h-full"
            href="#">
            <span class="material-symbols-outlined mb-1">home</span>
            <span class="font-label-sm text-label-sm">Trang chủ</span>
        </a>
        <!-- Tìm kiếm (Active) -->
        <a class="flex flex-col items-center justify-center text-primary dark:text-primary-fixed font-label-bold hover:bg-surface-container-low dark:hover:bg-surface-variant transition-all active:scale-95 duration-200 w-16 h-full"
            href="#">
            <span class="material-symbols-outlined mb-1 icon-fill">search</span>
            <span class="font-label-sm text-label-sm font-bold">Tìm kiếm</span>
        </a>
        <!-- Đã lưu -->
        <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-variant transition-all active:scale-95 duration-200 w-16 h-full"
            href="#">
            <span class="material-symbols-outlined mb-1">bookmark</span>
            <span class="font-label-sm text-label-sm">Đã lưu</span>
        </a>
        <!-- Cá nhân -->
        <a class="flex flex-col items-center justify-center text-on-surface-variant dark:text-outline-variant hover:bg-surface-container-low dark:hover:bg-surface-variant transition-all active:scale-95 duration-200 w-16 h-full"
            href="#">
            <span class="material-symbols-outlined mb-1">person</span>
            <span class="font-label-sm text-label-sm">Cá nhân</span>
        </a>
    </nav>
    <!-- Lightweight interaction script for visual feedback -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const passBtn = document.querySelector('button[aria-label="Bỏ qua"]');
            const connectBtn = document.querySelector('button[aria-label="Kết nối"]');
            const card = document.getElementById('swipeCard');

            // Simple visual animation for buttons (not a full swipe logic, just UI feedback)
            passBtn.addEventListener('click', () => {
                card.style.transform = 'translate(-120%, 10deg) rotate(-10deg)';
                card.style.opacity = '0';
                setTimeout(() => {
                    card.style.transition = 'none';
                    card.style.transform = 'translate(0, 0) rotate(0)';
                    card.style.opacity = '1';
                    // Force reflow
                    void card.offsetWidth;
                    card.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
                }, 300);
            });

            connectBtn.addEventListener('click', () => {
                card.style.transform = 'translate(120%, -10deg) rotate(10deg)';
                card.style.opacity = '0';
                // Add a little pop effect to the heart
                connectBtn.querySelector('.material-symbols-outlined').style.transform = 'scale(1.3)';
                setTimeout(() => {
                    connectBtn.querySelector('.material-symbols-outlined').style.transform = 'scale(1)';
                }, 150);

                setTimeout(() => {
                    card.style.transition = 'none';
                    card.style.transform = 'translate(0, 0) rotate(0)';
                    card.style.opacity = '1';
                    void card.offsetWidth;
                    card.style.transition = 'transform 0.3s ease-out, opacity 0.3s ease-out';
                }, 300);
            });
        });
    </script>


</body>

</html>
