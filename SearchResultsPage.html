<body class="bg-background text-on-background font-body-md h-screen flex flex-col">

    <!-- Split View Container -->

            </div>
            <!-- Map Controls (Top Right) -->

            <!-- Interactive Map Pins (Simulated) -->

                    4.2M

    <script>
        const apiUrl = "http://localhost:3000/api/rooms/ai-search";
        const searchInput = document.getElementById("room-search-input");
        const searchButton = document.getElementById("room-search-button");
        const statusEl = document.getElementById("search-status");
        const countEl = document.getElementById("results-count");
        const locationEl = document.getElementById("results-location");
        const resultsEl = document.getElementById("results-list");

        function setStatus(message, isError = false) {
            if (!statusEl) return;
            statusEl.textContent = message;
            statusEl.className = isError
                ? "text-body-md font-body-md text-error mb-4"
                : "text-body-md font-body-md text-on-surface-variant mb-4";
        }

        function formatPrice(price) {
            if (typeof price !== "number") return String(price || "");
            return price.toLocaleString("vi-VN") + "đ";
        }

        function createAmenityChip(amenity) {
            return `<span class="px-3 py-1 bg-surface-container-high text-on-surface-variant rounded-full text-label-bold font-label-bold flex items-center gap-1"><span class="material-symbols-outlined text-[14px]" data-icon="check">check</span> ${amenity}</span>`;
        }

        function renderRooms(rooms) {
            if (!resultsEl) return;

            if (!rooms || rooms.length === 0) {
                resultsEl.innerHTML = `<div class="text-body-md font-body-md text-on-surface-variant">Không tìm thấy kết quả phù hợp. Hãy thử thay đổi truy vấn của bạn.</div>`;
                if (countEl) countEl.textContent = "Tìm thấy 0 phòng trọ";
                if (locationEl) locationEl.textContent = "Thử truy vấn khác để tìm phòng phù hợp.";
                return;
            }

            if (countEl) countEl.textContent = `Tìm thấy ${rooms.length} phòng trọ`;
            if (locationEl) locationEl.textContent = `Kết quả cho: "${searchInput?.value?.trim() || "..."}"`;

            resultsEl.innerHTML = rooms
                .map((room) => {
                    const amenities = Array.isArray(room.amenities) ? room.amenities : [];
                    const imageUrl = room.image || room.photo || "https://via.placeholder.com/640x320?text=Room";
                    const roomTitle = room.title || room.description || "Phòng trọ";
                    const roomLocation = [room.ward, room.district].filter(Boolean).join(", ");

                    return `
        <div class="flex flex-col bg-surface-container-lowest rounded-xl overflow-hidden shadow-[0px_4px_12px_rgba(0,0,0,0.05)] border border-outline-variant hover:shadow-[0px_8px_24px_rgba(0,88,190,0.1)] transition-shadow cursor-pointer group">
          <div class="relative h-48 w-full bg-surface-container-highest overflow-hidden">
            <img alt="${roomTitle}" class="w-full h-full object-cover" src="${imageUrl}" />
          </div>
          <div class="p-4 flex flex-col gap-2">
            <div class="flex justify-between items-start">
              <div>
                <p class="text-body-md font-body-md text-on-surface-variant flex items-center gap-1 mb-1">
                  <span class="material-symbols-outlined text-[16px]" data-icon="location_on">location_on</span>
                  ${roomLocation}
                </p>
                <h3 class="text-headline-md font-headline-md text-on-surface group-hover:text-primary transition-colors line-clamp-2">${roomTitle}</h3>
              </div>
            </div>
            <div class="text-headline-md font-headline-md font-bold text-primary mt-1">
              ${formatPrice(room.price)}<span class="text-body-md font-body-md text-on-surface-variant font-normal">/tháng</span>
            </div>
            <div class="flex flex-wrap gap-2 mt-2">
              ${amenities.map(createAmenityChip).join("")}
            </div>
          </div>
        </div>
      `;
                })
                .join("");
        }

        async function fetchRoomResults(query) {
            if (!statusEl) return;

            setStatus("AI đang tìm kiếm...", false);
            if (resultsEl) resultsEl.innerHTML = "";

            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({ query }),
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || "Lỗi khi gọi API");
                }

                const payload = await response.json();

                if (!payload?.success || !Array.isArray(payload.data)) {
                    throw new Error("Dữ liệu trả về không hợp lệ.");
                }

                renderRooms(payload.data);
                setStatus("Tìm kiếm hoàn tất.", false);
            } catch (error) {
                console.error(error);
                setStatus("Không thể tìm phòng. Vui lòng thử lại sau.", true);
                if (resultsEl) {
                    resultsEl.innerHTML = `<div class="text-body-md font-body-md text-error">Lỗi: ${error?.message || "Không xác định"}</div>`;
                }
            }
        }

        function startSearch() {
            const query = searchInput?.value?.trim();
            if (!query) {
                setStatus("Vui lòng nhập nội dung tìm kiếm.", true);
                return;
            }
            fetchRoomResults(query);
        }

        searchButton?.addEventListener("click", startSearch);
        searchInput?.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
                event.preventDefault();
                startSearch();
            }
        });
    </script>
</body>
